<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Laporan Piket OSIS</title>
    <link rel="icon" type="image/jpeg" href="https://cdn.yupra.my.id/yp/dc9y33vh.jpg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.7)), url('https://cdn.yupra.my.id/yp/dc9y33vh.jpg') no-repeat center center fixed;
            background-size: cover; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }

        .container { width: 100%; max-width: 400px; }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 30px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); text-align: center; color: white; transition: all 0.4s ease;
        }

        h2 { margin-bottom: 20px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); font-size: 22px; }

        input[type="text"], input[type="password"], select {
            width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 10px;
            background: rgba(255, 255, 255, 0.95); color: #333; font-size: 14px; outline: none; transition: 0.3s;
        }
        input:focus, select:focus { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4); }

        .password-wrapper { position: relative; }
        .toggle-eye { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #333; }

        button {
            width: 100%; padding: 14px; margin-top: 15px; border: none; border-radius: 10px;
            background: linear-gradient(135deg, #25D366, #128C7E); color: white; font-weight: 600;
            font-size: 15px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37, 211, 102, 0.6); }
        .btn-secondary { background: rgba(255, 255, 255, 0.2); color: #fff; box-shadow: none; }
        .btn-logout { background: #ff4757; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); }

        .form-group { text-align: left; margin: 15px 0; font-size: 14px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #25D366; }
        
        .flex-row { display: flex; gap: 10px; }
        .flex-row select { margin: 0; }

        .type-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .type-btn { 
            flex: 1; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            border-radius: 10px; color: white; cursor: pointer; transition: 0.3s; font-size: 13px; font-weight: 600;
        }
        .type-btn.active { background: #25D366; border-color: #25D366; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); }

        .search-wrapper { position: relative; width: 100%; }
        .dropdown-list {
            position: absolute; top: 100%; left: 0; right: 0; background: #fff; color: #333;
            border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); max-height: 150px; overflow-y: auto;
            z-index: 100; display: none; text-align: left; margin-top: 5px;
        }
        .dropdown-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 13px; }
        .dropdown-item:hover { background: #f1f1f1; color: #25D366; font-weight: 600; }
        .dropdown-item:last-child { border-bottom: none; }

        #manage-account { display: none; }
        #notification {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            min-width: 300px; padding: 15px 25px; border-radius: 50px;
            display: flex; align-items: center; gap: 12px; color: white; font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 9999; transition: 0.5s ease;
        }
        #notification.show { bottom: 40px; }
    </style>
</head>
<body>

    <div id="login-page" class="container">
        <div class="glass-effect">
            <h2>Piket Login</h2>
            <form id="login-form">
                <input type="text" id="username" placeholder="Username Petugas" required>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Password" required>
                    <span class="toggle-eye" onclick="togglePass('password')">👁️</span>
                </div>
                <button type="submit" id="btn-login">Masuk Sistem</button>
                <a class="forgot-password" onclick="showManageAccount()" style="display: block; margin-top: 15px; font-size: 0.85rem; color: #ddd; cursor: pointer; text-decoration: underline;">Lupa / Ganti Password?</a>
            </form>
        </div>
    </div>

    <div id="manage-account" class="container">
        <div class="glass-effect">
            <h2>Kelola Akun</h2>
            <input type="text" id="manage-user" placeholder="Username" required>
            <input type="text" id="manage-hari" placeholder="Hari Piket (ex: Senin)" required>
            <button type="button" onclick="lihatPassword()" id="btn-lihat" class="btn-secondary">Lihat Password</button>
            <div id="div-new-pass" style="display:none; margin-top: 15px;">
                <input type="text" id="manage-new-pass" placeholder="Ketik Password Baru">
                <button type="button" onclick="gantiPassword()" id="btn-ganti">Simpan Password Baru</button>
            </div>
            <button type="button" class="btn-secondary" onclick="showLogin()" style="margin-top: 10px;">Kembali ke Login</button>
        </div>
    </div>

    <div id="report-page" class="container" style="display: none;">
        <div class="glass-effect">
            <h2>Laporan Disiplin</h2>
            
            <div class="type-selector">
                <div class="type-btn active" id="btn-terlambat" onclick="pilihTipe('Terlambat')">🏃‍♂️ Terlambat</div>
                <div class="type-btn" id="btn-lainnya" onclick="pilihTipe('Lainnya')">📝 Pelanggaran Lain</div>
            </div>

            <form id="report-form">
                <div id="area-pelanggaran-lain" class="form-group" style="display: none;">
                    <label>Detail Pelanggaran:</label>
                    <input type="text" id="input-pelanggaran" placeholder="Contoh: Topi, Dasi, Baju Dikeluarkan">
                </div>

                <div class="form-group">
                    <label>Kelas & Jurusan:</label>
                    <div class="flex-row">
                        <select id="kelas" required onchange="loadNamaSiswa()">
                            <option value="" disabled selected>Kelas</option>
                            <option value="10">10</option>
                            <option value="11">11</option>
                            <option value="12">12</option>
                        </select>
                        <select id="jurusan" required onchange="loadNamaSiswa()">
                            <option value="" disabled selected>Jurusan</option>
                            <option value="TKR">TKR</option>
                            <option value="TKJ">TKJ</option>
                            <option value="MP">MP</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Nama Siswa:</label>
                    <div class="search-wrapper">
                        <input type="text" id="search-nama" placeholder="Ketik nama siswa..." autocomplete="off" required onkeyup="filterNama()" onclick="showDropdown()">
                        <div id="dropdown-nama" class="dropdown-list">
                            <div class="dropdown-item" style="color:#888;">Pilih kelas & jurusan dulu</div>
                        </div>
                    </div>
                </div>

                <button type="submit" id="btn-submit">🚀 Kirim Laporan</button>
                <button type="button" onclick="location.reload()" class="btn-logout">Keluar Akun</button>
            </form>
        </div>
    </div>

    <div id="notification"><span id="notif-icon">✅</span> <span id="notif-message">Pesan</span></div>

    <script>
        // URL SCRIPT LAPORAN (Database 1)
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyDktAfr8a60X4mg7jFIgtAbblSVAu7y6w6DsJnmyYF3DrVWV_bcHaTwM9cqgCw9r77/exec'; 
        
        // ⚠️ SPREADSHEET ABSENSI SISWA (Database 2) ⚠️
        const ID_SPREADSHEET_ABSEN = "12flkTGNFV6wjHRHCfSXS4FlLr6FpME5YKsJCH_pUMP8"; 

        const databaseWali = {
       "10-TKR": "6281292838856", "10-MP": "6281281405132", "10-TKJ": "6281212967496",
       "11-TKR": "6288809323951", "11-TKJ": "6289643336456", "11-MP": "6285281308102",
       "12-TKR": "6285772163978", "12-TKJ": "6285319085990", "12-MP": "6288211631470"
        };

        let currentUser = "";
        let tipePelanggaran = "Terlambat";
        let listSiswaTersedia = []; 

        function showNotification(success, msg) {
            const notif = document.getElementById('notification');
            notif.style.background = success ? "#25D366" : "#ff4757";
            document.getElementById('notif-icon').textContent = success ? "✅" : "❌";
            document.getElementById('notif-message').textContent = msg;
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 4000);
        }

        function togglePass(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function showManageAccount() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('manage-account').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('manage-account').style.display = 'none';
            document.getElementById('login-page').style.display = 'block';
        }

        function pilihTipe(tipe) {
            tipePelanggaran = tipe;
            document.getElementById('btn-terlambat').classList.toggle('active', tipe === 'Terlambat');
            document.getElementById('btn-lainnya').classList.toggle('active', tipe === 'Lainnya');
            
            const areaLain = document.getElementById('area-pelanggaran-lain');
            const inputLain = document.getElementById('input-pelanggaran');
            
            if (tipe === 'Lainnya') {
                areaLain.style.display = 'block';
                inputLain.required = true;
            } else {
                areaLain.style.display = 'none';
                inputLain.required = false;
                inputLain.value = "";
            }
        }

        // --- SISTEM TARIK DATA (CSV LINK LANGSUNG) ---
        async function loadNamaSiswa() {
            const kls = document.getElementById('kelas').value;
            let jur = document.getElementById('jurusan').value;
            const dropdown = document.getElementById('dropdown-nama');
            const inputSearch = document.getElementById('search-nama');

            inputSearch.value = ""; 

            if (!kls || !jur) {
                listSiswaTersedia = [];
                dropdown.innerHTML = `<div class="dropdown-item" style="color:#888;">Pilih kelas & jurusan dulu</div>`;
                return;
            }

            dropdown.innerHTML = `<div class="dropdown-item" style="color:#888;">⏳ Mengambil absen dari server...</div>`;
            showDropdown();

            // Auto-Correct Jurusan untuk sheet (TKR -> TKRO)
            if (jur === "TKR") jur = "TKRO";
            
            const sheetName = `${kls} ${jur}`; // e.g., "10 TKRO"
            
            // Logika Posisi Baris & Kolom
            const targetRange = (kls === "12") ? "B7:B" : "D2:D";

            // URL Ajaib Google Sheets CSV (Sangat Cepat!)
            const csvUrl = `https://docs.google.com/spreadsheets/d/${ID_SPREADSHEET_ABSEN}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}&range=${targetRange}&cache=${new Date().getTime()}`;

            try {
                const res = await fetch(csvUrl);
                if (!res.ok) throw new Error("Gagal load");
                
                const text = await res.text();
                
                // Parse CSV: Pecah per baris, buang tanda kutip
                let rawNames = text.split('\n').map(row => row.replace(/"/g, '').trim());
                
                // Bersihkan list (buang yang kosong atau teks Header)
                listSiswaTersedia = rawNames.filter(n => n !== "" && !n.toLowerCase().includes("nama siswa") && n.toLowerCase() !== "nama");

                if (listSiswaTersedia.length > 0) {
                    renderDropdown(listSiswaTersedia);
                } else {
                    dropdown.innerHTML = `<div class="dropdown-item" style="color:#ff4757;">Data absen kosong. Cek nama sheet.</div>`;
                }
            } catch (error) {
                dropdown.innerHTML = `<div class="dropdown-item" style="color:#ff4757;">❌ Gagal memuat absen. Pastikan file Google Sheet Publik.</div>`;
            }
        }

        function renderDropdown(list) {
            const dropdown = document.getElementById('dropdown-nama');
            dropdown.innerHTML = "";
            list.forEach(nama => {
                const div = document.createElement('div');
                div.className = 'dropdown-item';
                div.textContent = nama;
                div.onclick = () => pilihNama(nama);
                dropdown.appendChild(div);
            });
        }

        function filterNama() {
            const search = document.getElementById('search-nama').value.toLowerCase();
            const filtered = listSiswaTersedia.filter(n => n.toLowerCase().includes(search));
            renderDropdown(filtered);
            showDropdown();
        }

        function showDropdown() {
            if(listSiswaTersedia.length > 0 || document.getElementById('dropdown-nama').innerHTML.includes('Mengambil')) {
                document.getElementById('dropdown-nama').style.display = 'block';
            }
        }

        function pilihNama(nama) {
            document.getElementById('search-nama').value = nama;
            document.getElementById('dropdown-nama').style.display = 'none';
        }

        document.addEventListener('click', function(e) {
            if (!document.querySelector('.search-wrapper').contains(e.target)) {
                document.getElementById('dropdown-nama').style.display = 'none';
            }
        });

        // --- SISTEM AUTH ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            btn.innerText = "⏳ Memeriksa..."; btn.disabled = true;

            const uName = document.getElementById('username').value;
            const uPass = document.getElementById('password').value;

            try {
                const res = await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "login", username: uName, password: uPass })
                });
                const data = await res.json();
                
                if(data.status === "success") {
                    currentUser = uName;
                    document.getElementById('login-page').style.display = 'none';
                    document.getElementById('report-page').style.display = 'block';
                    showNotification(true, `Selamat bertugas, ${uName}!`);
                } else { showNotification(false, data.message); }
            } catch(e) { showNotification(false, "Gangguan jaringan."); }
            btn.innerText = "Masuk Sistem"; btn.disabled = false;
        });

        // --- KIRIM LAPORAN ---
        document.getElementById('report-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btnSubmit = document.getElementById('btn-submit');
            
            const dNama = document.getElementById('search-nama').value.trim();
            const dKelas = document.getElementById('kelas').value;
            const dJurusan = document.getElementById('jurusan').value;
            
            let dPelanggaran = tipePelanggaran === "Lainnya" ? document.getElementById('input-pelanggaran').value : "Terlambat";

            // Wajib dari list absen
            if (!listSiswaTersedia.includes(dNama) && listSiswaTersedia.length > 0) {
                showNotification(false, "⚠️ Harap pilih nama dari list absen!");
                return;
            }

            btnSubmit.innerHTML = "⏳ Mengirim..."; btnSubmit.disabled = true;

            const kunciTujuan = `${dKelas}-${dJurusan}`;
            const nWali = databaseWali[kunciTujuan] || "-";

            const d = new Date();
            const pad = (n) => n.toString().padStart(2, '0');
            const waktuSekarang = `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;

            const payload = {
                action: "add", waktu: waktuSekarang, siswa: dNama, kelas: dKelas, jurusan: dJurusan,
                pelanggaran: dPelanggaran, petugas: currentUser, nomorWali: nWali
            };

            try {
                const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) });
                const data = await res.json();
                
                if (data.status === "success") {
                    showNotification(true, "✅ Laporan Berhasil Dikirim!");
                    document.getElementById('search-nama').value = ""; 
                    document.getElementById('input-pelanggaran').value = "";
                } else { showNotification(false, "❌ Gagal kirim data."); }
            } catch (error) { showNotification(false, "❌ Koneksi error."); }
            
            btnSubmit.innerHTML = "🚀 Kirim Laporan"; btnSubmit.disabled = false;
        });

        // Search dan ganti pass
        async function lihatPassword() {
            const uName = document.getElementById('manage-user').value;
            const uHari = document.getElementById('manage-hari').value;
            if(!uName || !uHari) return showNotification(false, "Isi Username & Hari!");
            const btn = document.getElementById('btn-lihat'); btn.innerText = "Mencari...";
            try {
                const res = await fetch(`${scriptURL}?action=searchPass&nama=${uName}&hari=${uHari}`);
                const data = await res.json();
                if(data.status === "success") {
                    showNotification(true, `Password ditemukan!`);
                    document.getElementById('div-new-pass').style.display = 'block';
                    document.getElementById('manage-new-pass').value = data.pass; 
                } else { showNotification(false, data.message); }
            } catch(e) { showNotification(false, "Gagal koneksi."); }
            btn.innerText = "Lihat Password";
        }

        async function gantiPassword() {
            const uName = document.getElementById('manage-user').value;
            const uHari = document.getElementById('manage-hari').value;
            const newPass = document.getElementById('manage-new-pass').value;
            if(!newPass) return showNotification(false, "Password tidak boleh kosong!");
            const btn = document.getElementById('btn-ganti'); btn.innerText = "Menyimpan...";
            try {
                const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify({ action: "changePass", username: uName, hari: uHari, newPass: newPass }) });
                const data = await res.json();
                showNotification(data.status === "success", data.message);
                if(data.status === "success") setTimeout(showLogin, 2000);
            } catch(e) { showNotification(false, "Gagal menyimpan."); }
            btn.innerText = "Simpan Password Baru";
        }
    </script>
</body>
</html>
